<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroRide | AI Routes</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030a16;
            --panel-bg: rgba(7, 18, 40, 0.85);
            --primary-blue: #00d2ff;
            --neon-pink: #ff007f;
            --text-main: #e0eaff;
            --text-muted: #6b82b8;
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        nav {
            width: 100%;
            background: rgba(7,18,40,0.95);
            padding: 12px 30px;
            display: flex;
            justify-content: center;
            gap: 30px;
            border-bottom: 1px solid rgba(0,210,255,0.3);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        nav a {
            color: #00d2ff;
            text-decoration: none;
            font-family: var(--font-head);
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        nav a:hover { color: #ff007f; }
        nav a.active { color: #ff007f; }

        .page-content {
            padding: 40px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
        }

        .page-header h1 {
            font-family: var(--font-head);
            font-size: 2rem;
            color: var(--primary-blue);
            letter-spacing: 3px;
        }

        .page-header h1 span { color: var(--neon-pink); }

        .page-header p {
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-top: 8px;
        }

        .controls {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 150px;
        }

        .control-group label {
            font-family: var(--font-head);
            font-size: 0.75rem;
            color: var(--primary-blue);
            letter-spacing: 1px;
        }

        .control-group select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 210, 255, 0.5);
            color: #fff;
            padding: 12px;
            font-family: var(--font-body);
            font-size: 1rem;
            border-radius: 6px;
            outline: none;
        }

        .generate-btn {
            background: linear-gradient(135deg, #00d2ff, #0099cc);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-family: var(--font-head);
            font-size: 0.85rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            white-space: nowrap;
        }

        .generate-btn:hover {
            background: linear-gradient(135deg, #33ddff, #00d2ff);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
            transform: translateY(-2px);
        }

        .routes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .route-card {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .route-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #00d2ff, #ff007f);
        }

        .route-card:hover {
            border-color: rgba(0, 210, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.1);
            transform: translateY(-3px);
        }

        .route-name {
            font-family: var(--font-head);
            font-size: 1rem;
            color: var(--primary-blue);
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .route-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .route-stat {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }

        .route-stat h5 {
            font-family: var(--font-head);
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .route-stat p {
            font-family: var(--font-head);
            font-size: 1.1rem;
            color: var(--neon-pink);
        }

        .waypoints-title {
            font-family: var(--font-head);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .waypoints-list {
            list-style: none;
            padding: 0;
        }

        .waypoints-list li {
            padding: 6px 10px;
            border-left: 2px solid rgba(0, 210, 255, 0.3);
            margin-bottom: 5px;
            font-size: 0.95rem;
            color: var(--text-main);
            position: relative;
        }

        .waypoints-list li:first-child {
            border-left-color: #00d2ff;
            color: var(--primary-blue);
            font-weight: bold;
        }

        .waypoints-list li:last-child {
            border-left-color: #ff007f;
            color: var(--neon-pink);
            font-weight: bold;
        }

        .duration-badge {
            display: inline-block;
            background: rgba(255, 0, 127, 0.15);
            border: 1px solid rgba(255, 0, 127, 0.3);
            color: var(--neon-pink);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: var(--font-head);
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            font-family: var(--font-head);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .loading span {
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/frontend/index.html">🏠 REGISTRATION</a>
    <a href="/frontend/leaderboard.html">🏆 LEADERBOARD</a>
    <a href="/dashboard/index.html">📊 DASHBOARD</a>
    <a href="/frontend/routes.html" class="active">🗺️ AI ROUTES</a>
    <a href="/frontend/admin.html">⚙️ ADMIN</a>
</nav>

<div class="page-content">
    <div class="page-header">
        <h1>AI <span>ROUTES</span></h1>
        <p>SURPRISE CYCLING ROUTES — GENERATED BY AI</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>PARTICIPANT LEVEL</label>
            <select id="levelSelect">
                <option value="beginner">Beginner</option>
                <option value="intermediate" selected>Intermediate</option>
                <option value="advanced">Advanced</option>
            </select>
        </div>
        <button onclick="generateRoutes()" class="generate-btn">⚡ GENERATE ROUTES</button>
    </div>

    <div id="routesContainer" class="routes-grid">
        <div class="loading"><span>Click GENERATE ROUTES to start...</span></div>
    </div>
</div>

<script>
    const API_URL = "/api";

    async function generateRoutes() {
        const level = document.getElementById('levelSelect').value;
        const container = document.getElementById('routesContainer');

        container.innerHTML = '<div class="loading"><span>⚡ GENERATING ROUTES...</span></div>';

        try {
            const response = await fetch(`${API_URL}/participants/routes?level=${level}`);
            const data = await response.json();

            container.innerHTML = '';

            data.routes.forEach(route => {
                const card = document.createElement('div');
                card.className = 'route-card';
                card.innerHTML = `
                    <div class="route-name">🗺️ ${route.name}</div>
                    <div class="duration-badge">⏱ ${route.duration_minutes} MIN RIDE</div>
                    <div class="route-stats">
                        <div class="route-stat">
                            <h5>DISTANCE</h5>
                            <p>${route.estimated_distance_km} km</p>
                        </div>
                        <div class="route-stat">
                            <h5>CALORIES</h5>
                            <p>${route.estimated_calories} kcal</p>
                        </div>
                    </div>
                    <div class="waypoints-title">📍 WAYPOINTS</div>
                    <ul class="waypoints-list">
                        ${route.waypoints.map(w => `<li>${w.name}</li>`).join('')}
                    </ul>
                `;
                container.appendChild(card);
            });

        } catch (error) {
            container.innerHTML = '<div class="loading" style="color: #ff007f;">Error loading routes. Make sure the backend is running.</div>';
            console.error(error);
        }
    }
</script>
</body>
</html>
