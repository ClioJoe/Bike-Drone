<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroRide | Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AERORIDE <span>2026</span></h1>
            <p class="subtitle">PARTICIPANT LEADERBOARD</p>
            <div class="event-details">
                <p><strong>DATE:</strong> June 4, 2026 | 18:00 - 20:00</p>
                <p><strong>LOCATION:</strong> TalTech, Tallinn</p>
            </div>
            <div class="status-bar">
                REGISTERED: <span id="totalCount">0</span> / 50
            </div>
        </header>

        <div class="table-container">
            <table class="cyber-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Strava Score</th>
                        <th>Level</th>
                        <th>Bike</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                </tbody>
            </table>
        </div>

        <a href="index.html" class="cyber-btn secondary-btn" style="margin-top: 30px; display: block; text-align: center; padding: 15px; text-decoration: none;">
            ← BACK TO REGISTRATION
        </a>
    </div>

    <script>
        const participants = JSON.parse(localStorage.getItem('aeroRideParticipants')) || [];

        // Sort by Strava score (highest first)
        participants.sort((a, b) => b.stravaScore - a.stravaScore);

        document.getElementById('totalCount').innerText = participants.length;

        const tbody = document.getElementById('leaderboardBody');

        if (participants.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" style="text-align:center; color: var(--text-muted); padding: 30px;">
                        No participants registered yet.
                    </td>
                </tr>`;
        } else {
            participants.forEach((p, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="rank-number">${index + 1}</td>
                    <td>${p.firstName} ${p.lastName}</td>
                    <td style="color: var(--primary-blue); font-weight: bold;">${p.stravaScore}</td>
                    <td>${p.level}</td>
                    <td>${p.bikeStatus}</td>
                `;
                tbody.appendChild(row);
            });
        }
    </script>
</body>
</html>
