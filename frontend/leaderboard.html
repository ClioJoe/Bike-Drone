<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroRide | Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<nav style="background: rgba(7,18,40,0.95); padding: 12px 30px; display: flex; justify-content: center; gap: 30px; border-bottom: 1px solid rgba(0,210,255,0.3); position: sticky; top: 0; z-index: 999;">
    <a href="/frontend/index.html" style="color: #00d2ff; text-decoration: none; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 1px;">🏠 REGISTRATION</a>
    <a href="/frontend/leaderboard.html" style="color: #ff007f; text-decoration: none; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 1px;">🏆 LEADERBOARD</a>
    <a href="/dashboard/index.html" style="color: #00d2ff; text-decoration: none; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 1px;">📊 DASHBOARD</a>
    <a href="/frontend/admin.html" style="color: #ff007f; text-decoration: none; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 1px;">⚙️ ADMIN</a>
</nav>

    <div class="container">
        <header>
            <h1>AERORIDE <span>2026</span></h1>
            <p class="subtitle">PARTICIPANT LEADERBOARD</p>
            <div class="event-details">
                <p><strong>DATE:</strong> June 4, 2026 | 18:00 - 20:00</p>
                <p><strong>LOCATION:</strong> TalTech, Tallinn</p>
            </div>
            <div class="status-bar">
                REGISTERED: <span id="totalCount">0</span> / 50
            </div>
        </header>
        <div class="table-container">
            <table class="cyber-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Strava Score</th>
                        <th>Level</th>
                        <th>Bike</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr>
                        <td colspan="5" style="text-align:center; color: var(--text-muted); padding: 30px;">
                            Loading participants...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <a href="/frontend/index.html" class="cyber-btn secondary-btn" style="margin-top: 30px; display: block; text-align: center; padding: 15px; text-decoration: none;">
            ← BACK TO REGISTRATION
        </a>
    </div>
    <script>
        const API_URL = "/api";
        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_URL}/participants/`);
                const data = await response.json();
                document.getElementById('totalCount').innerText = data.total;
                const tbody = document.getElementById('leaderboardBody');
                if (data.participants.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" style="text-align:center; color: var(--text-muted); padding: 30px;">
                                No participants registered yet.
                            </td>
                        </tr>`;
                } else {
                    tbody.innerHTML = '';
                    data.participants.forEach((p, index) => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td class="rank-number">${index + 1}</td>
                            <td>${p.firstName} ${p.lastName}</td>
                            <td style="color: var(--primary-blue); font-weight: bold;">${p.stravaScore}</td>
                            <td>${p.level}</td>
                            <td>${p.bikeStatus}</td>
                        `;
                        tbody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error("Could not load leaderboard:", error);
                document.getElementById('leaderboardBody').innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align:center; color: var(--neon-pink); padding: 30px;">
                            Error loading data. Make sure the backend is running.
                        </td>
                    </tr>`;
            }
        }
        loadLeaderboard();
    </script>
</body>
</html>
